<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMBIT | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B1B3D; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glass max-w-md w-full rounded-3xl p-10 shadow-2xl text-center">
        <div class="text-white font-black text-3xl tracking-tighter mb-8">
            KOMB<span class="text-[#E3000F]">I</span>T
        </div>
        <div id="loginForm" class="space-y-4">
            <input type="email" id="email" placeholder="Email address" class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#E3000F] transition-all">
            <input type="password" id="password" placeholder="Password" class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#E3000F] transition-all">
            <button onclick="handleLogin()" class="w-full bg-white text-[#0B1B3D] font-bold py-3 rounded-xl hover:bg-[#E3000F] hover:text-white transition-all">Sign In</button>
            <button onclick="handleSignUp()" class="w-full border border-white/20 text-white font-bold py-3 rounded-xl hover:bg-white/10 transition-all mt-2">Create Account</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // DO NOT change these strings; GitHub Actions will replace them
        const SUPABASE_URL = 'process.env.SUPABASE_URL';
        const SUPABASE_KEY = 'process.env.SUPABASE_KEY';

        let supabaseClient;
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error("Supabase failed to initialise:", e);
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!supabaseClient) return alert("Auth not ready. Check your Supabase keys.");
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else window.location.href = 'index.html';
        }

        async function handleSignUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!supabaseClient) return alert("Auth not ready. Check your Supabase keys.");
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) alert(error.message);
            else alert('Account created! Check your email for a confirmation link.');
        }
    </script>
</body>
</html>
