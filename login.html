<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMBIT | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B1B3D; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
            background: #16a34a; color: white; padding: 12px 24px;
            border-radius: 12px; font-weight: bold; font-size: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 9999;
            opacity: 0; transition: opacity 0.4s ease; white-space: nowrap;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="toast" class="toast"></div>

    <div class="glass max-w-md w-full rounded-3xl p-10 shadow-2xl text-center">
        <div class="text-white font-black text-3xl tracking-tighter mb-2">
            KOMB<span class="text-[#E3000F]">I</span>T
        </div>
        <p class="text-gray-400 text-sm mb-8">Secure Access Portal</p>

        <!-- ── SIGN IN FORM ── -->
        <div id="formSignIn" class="space-y-4">
            <input type="email" id="si-email" placeholder="Email address"
                class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#E3000F] transition-all">
            <input type="password" id="si-password" placeholder="Password"
                class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#E3000F] transition-all">
            <button onclick="handleLogin()"
                class="w-full bg-white text-[#0B1B3D] font-bold py-3 rounded-xl hover:bg-[#E3000F] hover:text-white transition-all">
                Sign In
            </button>
            <p class="text-gray-400 text-sm pt-2">
                Don't have an account? 
                <span onclick="showSignUp()" class="text-[#E3000F] font-bold cursor-pointer hover:underline">Create Account</span>
            </p>
        </div>

        <!-- ── CREATE ACCOUNT FORM ── -->
        <div id="formSignUp" class="space-y-4 hidden">
            <div class="flex gap-3">
                <input type="text" id="su-firstname" placeholder="First name"
                    class="w-1/2 bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#E3000F] transition-all">
                <input type="text" id="su-lastname" placeholder="Last name"
                    class="w-1/2 bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#E3000F] transition-all">
            </div>
            <input type="email" id="su-email" placeholder="Email address"
                class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#E3000F] transition-all">
            <input type="password" id="su-password" placeholder="Password (min. 6 characters)"
                class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#E3000F] transition-all">
            <input type="password" id="su-confirm" placeholder="Confirm password"
                class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#E3000F] transition-all">
            <button onclick="handleSignUp()"
                class="w-full bg-white text-[#0B1B3D] font-bold py-3 rounded-xl hover:bg-[#E3000F] hover:text-white transition-all">
                Create Account
            </button>
            <p class="text-gray-400 text-sm pt-2">
                Already have an account? 
                <span onclick="showSignIn()" class="text-[#E3000F] font-bold cursor-pointer hover:underline">Sign In</span>
            </p>
        </div>

        <!-- ── SUCCESS MESSAGE (after signup) ── -->
        <div id="formSuccess" class="hidden text-center space-y-4">
            <div class="text-5xl mb-4">📧</div>
            <h2 class="text-white font-bold text-xl">Account Created!</h2>
            <p class="text-gray-400 text-sm leading-relaxed">
                We've sent a confirmation email to<br>
                <span id="success-email" class="text-white font-bold"></span>
            </p>
            <p class="text-gray-400 text-sm leading-relaxed">
                Please click the link in that email to activate your account, then come back here to sign in.
            </p>
            <button onclick="showSignIn()"
                class="w-full bg-white text-[#0B1B3D] font-bold py-3 rounded-xl hover:bg-[#E3000F] hover:text-white transition-all mt-4">
                Back to Sign In
            </button>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // DO NOT change these strings; GitHub Actions will replace them
        const SUPABASE_URL = 'process.env.SUPABASE_URL';
        const SUPABASE_KEY = 'process.env.SUPABASE_KEY';

        let supabaseClient;
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error("Supabase failed to initialise:", e);
        }

        // ── Handle email confirmation redirect ──
        (async function handleConfirmation() {
            const hash = window.location.hash;
            if (hash && hash.includes('access_token')) {
                history.replaceState(null, '', window.location.pathname);
                showToast('✅ Email confirmed! You can now sign in.');
            }
        })();

        // ── Screen switchers ──
        function showSignIn() {
            document.getElementById('formSignIn').classList.remove('hidden');
            document.getElementById('formSignUp').classList.add('hidden');
            document.getElementById('formSuccess').classList.add('hidden');
        }

        function showSignUp() {
            document.getElementById('formSignIn').classList.add('hidden');
            document.getElementById('formSignUp').classList.remove('hidden');
            document.getElementById('formSuccess').classList.add('hidden');
        }

        function showSuccess(email) {
            document.getElementById('formSignIn').classList.add('hidden');
            document.getElementById('formSignUp').classList.add('hidden');
            document.getElementById('formSuccess').classList.remove('hidden');
            document.getElementById('success-email').textContent = email;
        }

        // ── Toast helper ──
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = isError ? '#dc2626' : '#16a34a';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 5000);
        }

        // ── Sign In ──
        async function handleLogin() {
            const email = document.getElementById('si-email').value.trim();
            const password = document.getElementById('si-password').value.trim();
            if (!email || !password) return showToast('Please enter your email and password.', true);
            if (!supabaseClient) return showToast('Auth not ready. Check your Supabase keys.', true);

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) showToast(error.message, true);
            else window.location.href = 'index.html';
        }

        // ── Create Account ──
        async function handleSignUp() {
            const firstName = document.getElementById('su-firstname').value.trim();
            const lastName  = document.getElementById('su-lastname').value.trim();
            const email     = document.getElementById('su-email').value.trim();
            const password  = document.getElementById('su-password').value.trim();
            const confirm   = document.getElementById('su-confirm').value.trim();

            if (!firstName || !lastName)      return showToast('Please enter your first and last name.', true);
            if (!email)                        return showToast('Please enter your email address.', true);
            if (password.length < 6)           return showToast('Password must be at least 6 characters.', true);
            if (password !== confirm)          return showToast('Passwords do not match.', true);
            if (!supabaseClient)               return showToast('Auth not ready. Check your Supabase keys.', true);

            const { error } = await supabaseClient.auth.signUp({
                email,
                password,
                options: {
                    data: { first_name: firstName, last_name: lastName }
                }
            });

            if (error) showToast(error.message, true);
            else showSuccess(email);
        }

        // ── Enter key triggers Sign In ──
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (!document.getElementById('formSignIn').classList.contains('hidden')) handleLogin();
                if (!document.getElementById('formSignUp').classList.contains('hidden')) handleSignUp();
            }
        });
    </script>
</body>
</html>
