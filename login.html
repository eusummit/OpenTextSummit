<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMBIT | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0B1B3D; background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px); background-size: 24px 24px; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 font-sans">
    <div class="glass max-w-md w-full rounded-3xl p-8 shadow-2xl">
        <div class="flex justify-center mb-10 text-white font-black text-3xl tracking-tighter">
            KOMB<span class="text-[#E3000F]">I</span>T
        </div>

        <div id="loginForm" class="space-y-4">
            <input type="email" id="email" placeholder="Email address" class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#E3000F] transition-all">
            <input type="password" id="password" placeholder="Password" class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#E3000F] transition-all">
            <button onclick="handleLogin()" class="w-full bg-white text-[#0B1B3D] font-bold py-3 rounded-xl hover:bg-[#E3000F] hover:text-white transition-all">Sign In</button>
            <p class="text-center text-gray-400 text-xs">New? <a href="#" onclick="handleSignUp()" class="text-white hover:underline">Create account</a></p>
        </div>
    </div>

 <script>
    // 1. Declare the keys (GitHub Actions will fill these)
    const SUPABASE_URL = 'process.env.SUPABASE_URL';
    const SUPABASE_KEY = 'process.env.SUPABASE_KEY';

    // 2. Initialize ONLY ONCE
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 3. Define the Login function
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (!email || !password) {
            alert("Please enter email and password");
            return;
        }

        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert("Login Error: " + error.message);
        else window.location.href = 'index.html';
    }

    // 4. Define the Sign Up function
    async function handleSignUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (!email || !password) {
            alert("Please enter email and password");
            return;
        }

        console.log("Attempting signup...");
        const { data, error } = await supabase.auth.signUp({ email, password });
        
        if (error) {
            alert("Signup Error: " + error.message);
        } else {
            alert("Signup successful! You can now Sign In.");
        }
    }
</script>
</body>
</html>
