<!DOCTYPE html>
<html>
<head>
    <script>
        // Grab the full URL including the hash and redirect to your login page
        const hash = window.location.hash;
        if (hash && hash.includes('access_token')) {
            window.location.replace('https://eusummit.github.io/OpenTextSummit/login.html' + hash);
        } else {
            window.location.replace('https://eusummit.github.io/OpenTextSummit/');
        }
    </script>
</head>
<body></body>
</html>
